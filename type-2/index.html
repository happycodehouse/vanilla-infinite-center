<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="./css/style.min.css">
    <title>vanilla-infinite-center-type-2</title>
</head>
<body>

<div id="wrap" class="wrap">
    <header>
        <h1>Type 2</h1>
        <p>description here!!!</p>
    </header>

    <div class="container">
        <button id="maskBtn" class="mask-btn">MASK OFF</button>
        <div id="mask" class="mask">
            <div class="mask-item"><span></span></div>
        </div>

        <div class="slide-wrapper">
            <div class="slide-items">
                <div class="slide-item"><span>1</span></div>
                <div class="slide-item"><span>2</span></div>
                <div class="slide-item"><span>3</span></div>
                <div class="slide-item"><span>4</span></div>
                <div class="slide-item"><span>5</span></div>
            </div>

            <div class="controls">
                <button id="prevBtn">prev</button>
                <button id="nextBtn">next</button>
            </div>
        </div>
    </div>
</div>
<script src="./js/custom.js"></script>
</body>
</html>
