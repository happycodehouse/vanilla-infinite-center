<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="./css/style.min.css">
    <title>vanilla-infinite-center-type-1</title>
</head>
<body>
<div id="wrap" class="wrap">
    <header>
        <h1>Type 1</h1>
        <p>Images sourced from
            <a href="https://www.eesookee.com/" rel="noopener noreferrer" target="_blank">eesookee.com</a>
        </p>
    </header>
    <div class="carousel">
        <div class="carousel-inner">
            <div class="slide"><span>1</span><img src="./images/img-01.jpg" alt=""></div>
            <div class="slide"><span>2</span><img src="./images/img-02.jpg" alt=""></div>
            <div class="slide"><span>3</span><img src="./images/img-03.jpg" alt=""></div>
            <div class="slide"><span>4</span><img src="./images/img-04.jpg" alt=""></div>
            <div class="slide"><span>5</span><img src="./images/img-05.jpg" alt=""></div>
            <div class="slide"><span>6</span><img src="./images/img-06.jpg" alt=""></div>
            <div class="slide"><span>7</span><img src="./images/img-07.jpg" alt=""></div>
        </div>
    </div>

    <div class="pagination">
        <span id="current"></span> / <span id="total"></span>
    </div>

    <div class="controls">
        <button id="prevBtn">prev</button>
        <button id="nextBtn">next</button>
    </div>
</div>
<script src="./js/custom.js"></script>
</body>
</html>
