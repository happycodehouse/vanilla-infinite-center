<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="./css/style.min.css">
    <title>vanilla-infinite-center-type-3</title>
</head>
<body>
<div id="wrap" class="wrap">
    <header>
        <h1>Type 3 - Advanced</h1>
        <p>Dessert Collection</p>
    </header>
    <div class="container">
        <button id="maskBtn" class="mask-btn">MASK ON</button>
        <div id="mask" class="mask">
            <div class="mask-cover"></div>
            <div class="mask-item" data-mask="dessert-01">
                <span>PETIT FOURS</span>
            </div>
            <div class="mask-item" data-mask="dessert-02">
                <span>MUSH-RAGU</span>
            </div>
            <div class="mask-item" data-mask="dessert-03">
                <span>155MM</span>
            </div>
            <div class="mask-item" data-mask="dessert-04">
                <span>THE LOBSTER</span>
            </div>
            <div class="mask-item" data-mask="dessert-05">
                <span>BEAUTY & BEAST</span>
            </div>
            <div class="mask-item" data-mask="dessert-06">
                <span>SMOKE</span>
            </div>
            <div class="mask-item" data-mask="dessert-07">
                <span>PEAK SMALL</span>
            </div>
        </div>

        <div class="vic">
            <div class="vic-wrapper">
                <div class="vic-slide" data-slide="dessert-01"></div>
                <div class="vic-slide" data-slide="dessert-02"></div>
                <div class="vic-slide" data-slide="dessert-03"></div>
                <div class="vic-slide" data-slide="dessert-04"></div>
                <div class="vic-slide" data-slide="dessert-05"></div>
                <div class="vic-slide" data-slide="dessert-06"></div>
                <div class="vic-slide" data-slide="dessert-07"></div>
            </div>

            <div class="controls">
                <button id="prevBtn">prev</button>
                <button id="nextBtn">next</button>
            </div>

            <div id="pagination" class="pagination">
                <button type="button" class="active" data-slide="dessert-01">PETIT FOURS</button>
                <button type="button" data-slide="dessert-02">MUSH-RAGU</button>
                <button type="button" data-slide="dessert-03">155MM</button>
                <button type="button" data-slide="dessert-04">THE LOBSTER</button>
                <button type="button" data-slide="dessert-05">BEAUTY & BEAST</button>
                <button type="button" data-slide="dessert-06">SMOKE</button>
                <button type="button" data-slide="dessert-07">PEAK SMALL</button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/ScrollTrigger.min.js"></script>
<script src="./js/custom.js"></script>
</body>
</html>
