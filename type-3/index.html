<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="./css/style.min.css">
    <title>vanilla-infinite-center-type-3</title>
</head>
<body>
<div id="wrap" class="wrap">
    <header>
        <h1>Type 3 - Advanced</h1>
        <p>Content sourced from <a href="https://www.pixar.com/" rel="noopener noreferrer" target="_blank">pixar.com</a></p>
    </header>
    <div class="container">
        <button id="maskBtn" class="mask-btn">MASK ON</button>
        <div id="mask" class="mask">
            <div id="maskCover" class="mask-cover"></div>
            <div class="mask-item" data-mask="woody">
                <span>Woody</span>
            </div>
            <div class="mask-item" data-mask="buzz-lightyear">
                <span>Buzz Lightyear</span>
            </div>
            <div class="mask-item" data-mask="jessie">
                <span>Jessie</span>
            </div>
            <div class="mask-item" data-mask="bullseye">
                <span>Bullseye</span>
            </div>
            <div class="mask-item" data-mask="mrs-potato-head">
                <span>Mrs. Potato Head</span>
            </div>
            <div class="mask-item" data-mask="wheezy">
                <span>Wheezy</span>
            </div>
            <div class="mask-item" data-mask="the-prospector">
                <span>The Prospector</span>
            </div>
            <div class="mask-item" data-mask="emperor-zurg">
                <span>Emperor Zurg</span>
            </div>
            <div class="mask-item" data-mask="al">
                <span>Al</span>
            </div>
        </div>

        <div class="vic">
            <div class="vic-wrapper">
                <div class="vic-slide" data-slide="woody"></div>
                <div class="vic-slide" data-slide="buzz-lightyear"></div>
                <div class="vic-slide" data-slide="jessie"></div>
                <div class="vic-slide" data-slide="bullseye"></div>
                <div class="vic-slide" data-slide="mrs-potato-head"></div>
                <div class="vic-slide" data-slide="wheezy"></div>
                <div class="vic-slide" data-slide="the-prospector"></div>
                <div class="vic-slide" data-slide="emperor-zurg"></div>
                <div class="vic-slide" data-slide="al"></div>
            </div>

            <div class="controls">
                <button id="prevBtn">prev</button>
                <button id="nextBtn">next</button>
            </div>

            <div id="pagination" class="pagination">
                <button type="button" class="active" data-slide="woody">1. Woody</button>
                <button type="button" data-slide="buzz-lightyear">2. Buzz Lightyear</button>
                <button type="button" data-slide="jessie">3. Jessie</button>
                <button type="button" data-slide="bullseye">4. Bullseye</button>
                <button type="button" data-slide="mrs-potato-head">5. Mrs. Potato Head</button>
                <button type="button" data-slide="wheezy">6. Wheezy</button>
                <button type="button" data-slide="the-prospector">7. The Prospector</button>
                <button type="button" data-slide="emperor-zurg">8. Emperor Zurg</button>
                <button type="button" data-slide="al">9. Al</button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/ScrollTrigger.min.js"></script>
<script src="./js/custom.js"></script>
</body>
</html>
