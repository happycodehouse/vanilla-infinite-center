<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="./css/style.min.css">
    <title>vanilla-infinite-center-type-3</title>
</head>
<body>
<div id="wrap" class="wrap">
    <header>
        <h1>Type 3 - Advanced</h1>
        <p>!!!description here!!!</p>
    </header>
    <div class="container">
        <button id="maskBtn" class="mask-btn">MASK OFF</button>
        <div id="mask" class="mask">
            <div class="mask-item"><span></span></div>
        </div>

        <div class="vic">
            <div class="vic-wrapper">
                <div class="vic-slide">1</div>
                <div class="vic-slide">2</div>
                <div class="vic-slide">3</div>
                <div class="vic-slide">4</div>
                <div class="vic-slide">5</div>
            </div>

            <div class="controls">
                <button id="prevBtn">prev</button>
                <button id="nextBtn">next</button>
            </div>
        </div>
    </div>
</div>
<script src="./js/custom.js"></script>
</body>
</html>
